# yamllint configuration — https://yamllint.readthedocs.io
extends: default

rules:
  line-length:
    max: 120
    level: warning

  # GitHub Actions workflows use 'on' as a key, which is a YAML truthy value.
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false

  comments:
    min-spaces-from-content: 1
