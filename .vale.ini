# Vale prose linter — https://vale.sh
# Uses the built-in Vale style; no `vale sync` required.
# Vale.Spelling is disabled — technical READMEs contain too many proper nouns
# and tool names that would otherwise require a large custom accept list.

StylesPath = .vale/styles
MinAlertLevel = warning

[*.md]
BasedOnStyles = Vale
Vale.Spelling = NO
